services:
  - type: web
    name: solarix-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app_mlr.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # Render 대시보드에서 직접 값 입력 (git에는 안 올라감)

  - type: web
    name: solarix-frontend
    runtime: static
    rootDir: public
    buildCommand: "true"
    staticPublishPath: .
